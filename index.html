<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="referrer" content="no-referrer" />

  <!-- Favicon / Icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" href="/favicon-512.png" />

  <!-- Performance: Preconnect to external APIs -->
  <link rel="preconnect" href="https://graphql.anilist.co" />
  <link rel="preconnect" href="https://api.jikan.moe" />
  <link rel="preconnect" href="https://kitsu.io" />
  <link rel="dns-prefetch" href="https://graphql.anilist.co" />
  <link rel="preload" as="image" href="/logo.png" />

  <!-- Primary Meta Tags -->
  <title>AniXO - Discover & Browse Your Favorite Anime</title>
  <meta name="title" content="AniXO - Discover & Browse Your Favorite Anime" />
  <meta name="description"
    content="Explore a vast library of anime with AniXO. Get real-time updates on trending, popular, and new releases using the AniList database." />
  <meta name="keywords" content="anime, anilist, browse anime, trending anime, anime database, anixo" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://anixo.online/" />
  <meta property="og:title" content="AniXO - Discover & Browse Your Favorite Anime" />
  <meta property="og:description"
    content="Explore a vast library of anime with AniXO. Get real-time updates on trending, popular, and new releases." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://anixo.online/" />
  <meta property="twitter:title" content="AniXO - Discover & Browse Your Favorite Anime" />
  <meta property="twitter:description"
    content="Explore a vast library of anime with AniXO. Get real-time updates on trending, popular, and new releases." />
  <meta property="twitter:image" content="/og-image.png" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#dc2626" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</body>

</html>
